<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" />

  <!-- Neural network nodes - representing memory engrams -->
  <!-- Central node -->
  <circle cx="100" cy="85" r="14" fill="white" opacity="0.95"/>

  <!-- Surrounding nodes -->
  <circle cx="55" cy="55" r="9" fill="white" opacity="0.8"/>
  <circle cx="145" cy="55" r="9" fill="white" opacity="0.8"/>
  <circle cx="45" cy="105" r="9" fill="white" opacity="0.7"/>
  <circle cx="155" cy="105" r="9" fill="white" opacity="0.7"/>
  <circle cx="70" cy="140" r="9" fill="white" opacity="0.6"/>
  <circle cx="130" cy="140" r="9" fill="white" opacity="0.6"/>

  <!-- Connections - representing experience links -->
  <line x1="100" y1="85" x2="55" y2="55" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="85" x2="145" y2="55" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="85" x2="45" y2="105" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="85" x2="155" y2="105" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="85" x2="70" y2="140" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="100" y1="85" x2="130" y2="140" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Cross connections -->
  <line x1="55" y1="55" x2="45" y2="105" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <line x1="145" y1="55" x2="155" y2="105" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <line x1="45" y1="105" x2="70" y2="140" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <line x1="155" y1="105" x2="130" y2="140" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <line x1="70" y1="140" x2="130" y2="140" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Glow effect on central node -->
  <circle cx="100" cy="85" r="20" fill="url(#glow)" opacity="0.5"/>

  <!-- Text -->
  <text x="100" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="white" opacity="0.95">ENGRAM</text>
</svg>
